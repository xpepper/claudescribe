name: Windows setup

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-setup:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run setup.bat
        shell: cmd
        run: setup.bat

      - name: Start server
        shell: pwsh
        run: |
          if (-not (Test-Path .venv\Scripts\python.exe)) {
            Write-Error "venv not found — did setup.bat succeed?"
            exit 1
          }
          New-NetFirewallRule -DisplayName "Claudescribe CI" -Direction Inbound -Protocol TCP -LocalPort 8000 -Action Allow -Profile Any -ErrorAction SilentlyContinue | Out-Null
          $proc = Start-Process .venv\Scripts\python.exe `
            -ArgumentList "-m", "uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "8000" `
            -WorkingDirectory $PWD `
            -PassThru
          "SERVER_PID=$($proc.Id.ToString().Trim())" | Out-File -FilePath $env:GITHUB_ENV -Append


      - name: Wait for server
        shell: pwsh
        run: |
          $url = "http://127.0.0.1:8000/api/health"
          $retries = 30
          $ready = $false
          for ($i = 1; $i -le $retries; $i++) {
            $code = curl.exe --noproxy "*" -s -o NUL -w "%{http_code}" --max-time 2 --connect-timeout 2 $url 2>$null
            if ($code -eq "200") {
              Write-Host "Server responded after $i second(s)"
              $ready = $true
              break
            }
            Write-Host "Attempt $i/$retries — not ready yet (HTTP $code)"
            Start-Sleep -Seconds 1
          }
          if (-not $ready) {
            Write-Error "Server did not respond after $retries seconds"
            exit 1
          }

      - name: Assert health endpoint
        shell: pwsh
        run: |
          $body = curl.exe --noproxy "*" -s http://127.0.0.1:8000/api/health
          Write-Host "Response: $body"
          if ($body -notmatch '"status":\s*"ok"') {
            Write-Error "Health check failed: unexpected response body: $body"
            exit 1
          }
          Write-Host "Health check passed"

      - name: Stop server
        if: always()
        shell: pwsh
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id ([int]$env:SERVER_PID.Trim()) -Force -ErrorAction SilentlyContinue
            Write-Host "Stopped server process $($env:SERVER_PID.Trim())"
          }
