name: Windows setup

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-setup:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run setup.bat
        shell: cmd
        run: setup.bat
